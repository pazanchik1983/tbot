name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Установить базовые зависимости
        run: |
          python -m pip install --upgrade pip
          # Фильтруем requirements.txt: убираем комментарии, пустые строки и tinkoff-investments
          (Get-Content requirements.txt) |
            Where-Object {
              $_ -notmatch '^\s*#' -and
              $_ -notmatch 'tinkoff-investments' -and
              $_.Trim() -ne ''
            } |
            Set-Content requirements-core.txt
          pip install -r requirements-core.txt
          pip install -r requirements-build.txt

      - name: Установить SDK Т-Инвестиций
        continue-on-error: true
        run: |
          pip install "tinkoff-investments>=0.2.0b113"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "PyPI недоступен, пробую из git..."
            pip install "git+https://github.com/RussianInvestments/invest-python.git@main"
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::SDK не установлен — EXE соберётся, но реальное API работать не будет."
            exit 0
          }

      - name: Прогнать тесты
        run: |
          pip install pytest
          python -m pytest tbot/tests -q

      - name: Собрать TBot.exe
        run: python packaging/build_exe.py

      - name: Упаковать в ZIP
        run: |
          $zip = "TBot-Windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Get-ChildItem -Path dist/TBot).FullName -DestinationPath $zip -Force

      - name: Загрузить готовый .exe
        uses: actions/upload-artifact@v4
        with:
          name: TBot-Windows
          path: TBot-Windows.zip
          retention-days: 30
