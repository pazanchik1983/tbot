name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          # Ставим ВСЕ пакеты из requirements.txt (включая tinkoff)
          pip install -r requirements.txt
          # Проверяем, установился ли tinkoff
          python -c "import tinkoff.invest" 2>$null
          if (-not $?) {
            Write-Host "PyPI не сработал, ставлю tinkoff из git..."
            pip install "git+https://github.com/RussianInvestments/invest-python.git@main"
          }
          pip install -r requirements-build.txt

      - name: Прогнать тесты
        run: |
          pip install pytest
          python -m pytest tbot/tests -q

      - name: Собрать TBot.exe
        run: python packaging/build_exe.py

      - name: Упаковать в ZIP
        run: |
          $zip = "TBot-Windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Get-ChildItem -Path dist/TBot).FullName -DestinationPath $zip -Force

      - name: Загрузить готовый .exe
        uses: actions/upload-artifact@v4
        with:
          name: TBot-Windows
          path: TBot-Windows.zip
          retention-days: 30
